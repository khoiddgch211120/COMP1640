spring.application.name=comp1640
spring.jackson.property-naming-strategy=SNAKE_CASE

# Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:comp1640}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Admin123@}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html

jwt.secret=${JWT_SECRET:comp1640-secret-key-1234567890-abcdef-xyz}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.thymeleaf.cache=false
server.port=8080

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dfnyvfiuq}
cloudinary.api-key=${CLOUDINARY_API_KEY:722446538895148}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:E8RB0nF6TxAKQ3SWmZ5lKkbZvpg}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

